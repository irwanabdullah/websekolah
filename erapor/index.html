<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | e-Rapor SMPN 13 Makassar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            background-color: var(--white);
        }

        /* LAYOUT KIRI: BAGIAN GAMBAR */
        .image-section {
            flex: 1.2; /* Sedikit lebih lebar dari form */
            background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1351&q=80') center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding: 50px;
            color: white;
        }

        /* Efek gelap transparan di atas gambar agar teks terbaca */
        .image-section::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(37, 99, 235, 0.2), rgba(15, 23, 42, 0.9));
        }

        .overlay-text {
            position: relative; z-index: 1;
        }

        .overlay-text h2 {
            font-size: 2.5rem; margin: 0 0 10px 0; line-height: 1.2;
        }

        .overlay-text p {
            font-size: 1.1rem; margin: 0; opacity: 0.9;
        }

        /* LAYOUT KANAN: FORM LOGIN */
        .form-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--white);
            padding: 40px;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
        }

        .login-header {
            margin-bottom: 35px;
        }

        .login-header h1 {
            margin: 0; font-size: 1.8rem; color: var(--text-main);
        }

        .login-header p {
            margin: 8px 0 0 0; font-size: 0.95rem; color: var(--text-muted);
        }

        .form-group { margin-bottom: 20px; }

        label {
            font-size: 0.85rem; font-weight: 600; color: var(--text-main);
            display: block; margin-bottom: 8px;
        }

        input[type="email"], input[type="password"], select {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 0.95rem; font-family: 'Inter', sans-serif;
            background: #f9fafb; transition: all 0.2s; box-sizing: border-box;
        }

        input:focus, select:focus {
            border-color: var(--primary); outline: 0; background: #fff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%; padding: 14px; background-color: var(--primary);
            color: white; border: none; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 1rem; font-family: 'Inter', sans-serif;
            transition: all 0.2s; margin-top: 15px;
        }

        .btn-login:hover { background-color: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37,99,235,0.2); }
        .btn-login:disabled { background-color: #93c5fd; cursor: not-allowed; transform: none; box-shadow: none;}

        /* Responsif untuk HP: Sembunyikan gambar jika layar kecil */
        @media (max-width: 768px) {
            .image-section { display: none; }
            .form-section { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="image-section">
        <div class="overlay-text">
            <h2>e-Rapor Kurikulum Merdeka</h2>
            <p>Sistem Informasi Akademik & Penilaian Terpadu<br><b>UPT SPF SMP Negeri 13 Makassar</b></p>
        </div>
    </div>

    <div class="form-section">
        <div class="login-container">
            <div class="login-header">
                <h1>Selamat Datang 👋</h1>
                <p>Silakan masuk ke akun Anda untuk melanjutkan.</p>
            </div>

            <form id="form-login">
                <div class="form-group">
                    <label for="email">Email Pengguna</label>
                    <input type="email" id="email" placeholder="nama@sekolah.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="login_tapel">Tahun Ajaran Aktif</label>
                    <select id="login_tapel" required>
                        <option value="">⏳ Memuat data dari server...</option>
                    </select>
                </div>

                <button type="submit" id="btn-login" class="btn-login">Masuk ke Dasbor</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { supabase } from './app.js'

        // 1. Fungsi untuk menarik data Tahun Ajaran ke Dropdown
        async function loadTapelLogin() {
            const { data, error } = await supabase.from('tahun_ajaran').select('*').order('id', { ascending: false });
            const selectTapel = document.getElementById('login_tapel');
            
            if (data && data.length > 0) {
                selectTapel.innerHTML = '';
                data.forEach(t => {
                    let namaSemester = t.semester == '1' ? 'Ganjil' : 'Genap';
                    selectTapel.innerHTML += `<option value="${t.id}">${t.nama} - Semester ${namaSemester}</option>`;
                });
            } else {
                selectTapel.innerHTML = '<option value="">(Belum ada data Tahun Ajaran)</option>';
            }
        }

        loadTapelLogin();

        // 2. Fungsi Proses Login
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('btn-login');
            btn.textContent = 'Memeriksa Akun...';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const tapelDropdown = document.getElementById('login_tapel');
            
            const selectedTapelId = tapelDropdown.value;
            const selectedTapelText = tapelDropdown.options[tapelDropdown.selectedIndex]?.text;

            if (!selectedTapelId) {
                alert("⚠️ Sistem tidak mendeteksi Tahun Ajaran. Hubungi Admin.");
                btn.textContent = 'Masuk ke Dasbor';
                btn.disabled = false;
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({ email: email, password: password });

            if (error) {
                alert("❌ Login Gagal: Email atau Kata Sandi salah.");
                btn.textContent = 'Masuk ke Dasbor';
                btn.disabled = false;
            } else {
                // Simpan Pilihan Tahun Ajaran
                localStorage.setItem('aktif_tapel_id', selectedTapelId);
                localStorage.setItem('aktif_tapel_nama', selectedTapelText);

                // Cek Role
                const { data: profile } = await supabase.from('profiles').select('roles').eq('id', data.user.id).single();
                
                if (profile && profile.roles && profile.roles.includes('admin')) {
                    window.location.replace('admin.html');
                } else {
                    window.location.replace('guru.html');
                }
            }
        });
    </script>
</body>
</html>
