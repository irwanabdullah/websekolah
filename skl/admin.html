<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kelulusan - SMPN 13 Makassar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7fb; }
        .navbar-custom { background-color: #1a237e; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .stat-card { border-radius: 15px; padding: 20px; color: white; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bg-gradient-primary { background: linear-gradient(45deg, #1e88e5, #1565c0); }
        .bg-gradient-success { background: linear-gradient(45deg, #43a047, #2e7d32); }
        .bg-gradient-danger { background: linear-gradient(45deg, #e53935, #c62828); }
        
        .main-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .table-custom th { background-color: #f8f9fa; color: #333; font-weight: 600; }
        .foto-thumb { width: 40px; height: 50px; object-fit: cover; border-radius: 5px; cursor: pointer; border: 1px solid #ddd;}
        
        /* Overlay Login */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 35, 126, 0.95); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-box shadow-lg">
            <i class="fa-solid fa-lock text-primary mb-3" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mb-4">Login Admin Panel</h4>
            <input type="password" id="adminPass" class="form-control form-control-lg mb-3" placeholder="Masukkan Password...">
            <button class="btn btn-primary w-100 py-2" onclick="cekLogin()">Masuk Sistem</button>
            <p class="text-muted small mt-3">*Default: ***</p>
        </div>
    </div>

    <nav class="navbar navbar-dark navbar-custom mb-4 py-3">
        <div class="container-fluid px-4">
            <span class="navbar-brand fw-bold"><i class="fa-solid fa-shield-halved me-2"></i>Admin Dashboard Kelulusan</span>
            <button class="btn btn-light btn-sm fw-bold" onclick="window.location.reload()"><i class="fa-solid fa-rotate me-1"></i>Refresh Data</button>
        </div>
    </nav>

    <div class="container-fluid px-4 pb-5">
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stat-card bg-gradient-primary">
                    <h6 class="text-uppercase mb-2 opacity-75">Total Siswa</h6>
                    <h2 class="fw-bold mb-0" id="countTotal">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card bg-gradient-success">
                    <h6 class="text-uppercase mb-2 opacity-75">Lulus</h6>
                    <h2 class="fw-bold mb-0" id="countLulus">0</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card bg-gradient-danger">
                    <h6 class="text-uppercase mb-2 opacity-75">Tidak Lulus / Tunda</h6>
                    <h2 class="fw-bold mb-0" id="countGagal">0</h2>
                </div>
            </div>
        </div>

        <div class="main-card">
            <h5 class="fw-bold mb-4"><i class="fa-solid fa-users me-2 text-primary"></i>Data Master Siswa</h5>
            <div class="table-responsive">
                <table id="tabelSiswa" class="table table-hover table-custom w-100">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NISN</th>
                            <th>Nama Siswa</th>
                            <th>Kelas</th>
                            <th>Nilai</th>
                            <th>Predikat</th>
                            <th>Status</th>
                            <th>Foto</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="bodySiswa"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEdit" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold">Edit Data Siswa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <input type="hidden" id="editNisn">
                    <div class="mb-3">
                        <label class="form-label text-muted small">Nama Siswa</label>
                        <input type="text" id="editNama" class="form-control fw-bold" readonly>
                    </div>
                    <div class="row mb-3">
                        <div class="col-6">
                            <label class="form-label">Nilai Akhir</label>
                            <input type="text" id="editNilai" class="form-control">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Predikat</label>
                            <input type="text" id="editPredikat" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status Kelulusan</label>
                        <select id="editStatus" class="form-select">
                            <option value="LULUS">LULUS</option>
                            <option value="TIDAK LULUS">TIDAK LULUS</option>
                            <option value="DITUNDA">DITUNDA</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-primary fw-bold" onclick="simpanEdit()">Simpan Perubahan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbztlAmARFfv_e3mrAxkrRqX9Lk2Uz6AFakTaFyR3X_TRiZkTh-RB24sCtBuOSYlQZNfIw/exec'; 
        let dataTableSiswa = null;

        // Login Sederhana
        function cekLogin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === 'admin123') {
                document.getElementById('loginOverlay').style.display = 'none';
                loadData();
            } else {
                Swal.fire('Akses Ditolak', 'Password Salah!', 'error');
            }
        }

        // Ambil Data dari API
        function loadData() {
            Swal.fire({ title: 'Menarik Data...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            
            fetch(`${SCRIPT_URL}?action=get_all`)
                .then(res => res.json())
                .then(res => {
                    Swal.close();
                    if(res.status === 'success') {
                        // Menyimpan data ke variabel global window agar bisa diakses oleh fungsi cetak
                        window.dataSiswaGlobal = res.data;
                        renderTable(res.data);
                    } else {
                        Swal.fire('Error', res.message, 'error');
                    }
                }).catch(err => {
                    Swal.fire('Error', 'Gagal terhubung ke database.', 'error');
                });
        }

        // Render Table & Statistik
        function renderTable(data) {
            if (dataTableSiswa) dataTableSiswa.destroy();
            
            let html = '';
            let tLulus = 0, tGagal = 0;

            data.forEach((row, index) => {
                const status = (row.Kelulusan || '').toUpperCase();
                let badge = '<span class="badge bg-secondary">KOSONG</span>';
                
                if (status.includes('LULUS') && !status.includes('TIDAK')) {
                    badge = '<span class="badge bg-success">LULUS</span>';
                    tLulus++;
                } else if (status.includes('TIDAK') || status.includes('GAGAL') || status.includes('TUNDA')) {
                    badge = '<span class="badge bg-danger">'+status+'</span>';
                    tGagal++;
                }

                let imgThumb = row.Foto ? `<img src="${getDirectImg(row.Foto)}" class="foto-thumb" onclick="window.open('${row.Foto}')" title="Klik untuk lihat">` : '<span class="text-muted small">Kosong</span>';

                html += `<tr>
                    <td>${index + 1}</td>
                    <td class="fw-bold">${row.Nisn}</td>
                    <td>${row.Nama_Siswa}</td>
                    <td>${row.Kelas || '-'}</td>
                    <td>${row.Nilai || '0'}</td>
                    <td>${row.Predikat || '-'}</td>
                    <td>${badge}</td>
                    <td>${imgThumb}</td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-sm btn-primary" onclick="bukaModal('${row.Nisn}', '${row.Nama_Siswa}', '${row.Nilai}', '${row.Predikat}', '${row.Kelulusan}')" title="Edit Nilai/Status">
                                <i class="fa-solid fa-pen-to-square"></i>
                            </button>

                            <input type="file" id="file-admin-${row.Nisn}" accept="image/*" style="display:none;" onchange="prosesUploadAdmin('${row.Nisn}')">
                            <button class="btn btn-sm btn-secondary" onclick="pilihFileAdmin('${row.Nisn}')" title="Bantu/Ganti Upload Foto">
                                <i class="fa-solid fa-camera"></i>
                            </button>

                            <button class="btn btn-sm btn-success" onclick="cetakSiswa('${row.Nisn}')" ${row.Foto ? '' : 'disabled'} title="${row.Foto ? 'Cetak SKL Resmi' : 'Foto belum ada, cetak dikunci'}">
                                <i class="fa-solid fa-print"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
            });

            document.getElementById('countTotal').innerText = data.length;
            document.getElementById('countLulus').innerText = tLulus;
            document.getElementById('countGagal').innerText = tGagal;
            document.getElementById('bodySiswa').innerHTML = html;
            
            dataTableSiswa = $('#tabelSiswa').DataTable({ language: { url: '//cdn.datatables.net/plug-ins/1.13.4/i18n/id.json' }});
        }

        const editModal = new bootstrap.Modal(document.getElementById('modalEdit'));
        function bukaModal(nisn, nama, nilai, predikat, status) {
            document.getElementById('editNisn').value = nisn;
            document.getElementById('editNama').value = nama;
            document.getElementById('editNilai').value = nilai;
            document.getElementById('editPredikat').value = predikat;
            document.getElementById('editStatus').value = status || 'LULUS';
            editModal.show();
        }

        // Simpan Edit Kelulusan
        function simpanEdit() {
            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
            const payload = JSON.stringify({
                action: 'update_nilai',
                nisn: document.getElementById('editNisn').value,
                nilai: document.getElementById('editNilai').value,
                predikat: document.getElementById('editPredikat').value,
                status: document.getElementById('editStatus').value
            });

            fetch(SCRIPT_URL, { method: 'POST', body: payload })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    editModal.hide();
                    Swal.fire('Berhasil!', 'Data tersimpan.', 'success').then(() => loadData());
                } else {
                    Swal.fire('Error', data.message, 'error');
                }
            });
        }

        // --- FUNGSI BARU 1: BANTU UPLOAD FOTO OLEH ADMIN ---
        function pilihFileAdmin(nisn) {
            document.getElementById('file-admin-' + nisn).click();
        }

        function prosesUploadAdmin(nisn) {
            const fileInput = document.getElementById('file-admin-' + nisn);
            const file = fileInput.files[0];
            if (!file) return;

            Swal.fire({
                title: 'Mengupload Foto...',
                text: 'File sedang dikirim ke Google Drive Belajar.id',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'upload_foto',
                        nisn: nisn,
                        file: base64Data,
                        mime: file.type
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        Swal.fire('Berhasil!', 'Foto siswa berhasil diperbarui oleh Admin.', 'success').then(() => {
                            loadData(); 
                        });
                    } else {
                        Swal.fire('Gagal Upload', data.message, 'error');
                    }
                })
                .catch(err => {
                    Swal.fire('Error', 'Terjadi gangguan jaringan: ' + err.toString(), 'error');
                });
            };
            reader.readAsDataURL(file);
        }

        // --- FUNGSI BARU 2: CETAK SKL SEBELUM / SESUDAH SISWA UPLOAD FOTO ---
        function cetakSiswa(nisn) {
            if(!window.dataSiswaGlobal) return;
            const siswa = window.dataSiswaGlobal.find(item => String(item.Nisn).trim() === String(nisn).trim());
            
            if (!siswa) {
                Swal.fire('Error', 'Data siswa tidak ditemukan!', 'error');
                return;
            }

            const cetakWindow = window.open('', '_blank', 'width=850,height=900');
            const isLulus = (siswa.Kelulusan || '').toUpperCase().includes('LULUS') && !(siswa.Kelulusan || '').toUpperCase().includes('TIDAK');
            const statusTextFix = isLulus ? 'LULUS' : 'TIDAK LULUS';
            const statusBoxStyle = isLulus ? 'border: 3px solid #2ec4b6; color: #2ec4b6;' : 'border: 3px solid #e71d36; color: #e71d36;';
            const fotoUrl = siswa.Foto ? getDirectImg(siswa.Foto) : '';

            // QR Code Data Payload
            const qrTextPayload = "VALIDASI DIGITAL SKL\n" +
                                  "=========================\n" +
                                  "Instansi: SMPN 13 MAKASSAR\n" +
                                  "Nama: " + siswa.Nama_Siswa.toUpperCase() + "\n" +
                                  "NISN: " + siswa.Nisn + "\n" +
                                  "Nilai Akhir: " + (siswa.Nilai || '-') + "\n" +
                                  "Status: " + statusTextFix + "\n" +
                                  "=========================\n" +
                                  "Dokumen Sah & Terverifikasi Admin.";
            
            const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=10&data=${encodeURIComponent(qrTextPayload)}`;

            const htmlContent = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Cetak SKL - ${siswa.Nama_Siswa}</title>
                <style>
                    body { font-family: 'Times New Roman', Times, serif; padding: 20px; color: black; background: white; line-height: 1.5; }
                    .kop-surat { display: flex; align-items: center; justify-content: space-between; border-bottom: 4px double black; padding-bottom: 10px; margin-bottom: 25px; }
                    .kop-surat img { width: 80px; height: auto; }
                    .kop-teks { text-align: center; flex: 1; padding: 0 15px; }
                    .kop-teks h3 { margin: 0; font-weight: bold; text-transform: uppercase; font-size: 13pt; line-height: 1.2; }
                    .kop-teks h2 { margin: 3px 0; font-weight: bold; font-size: 15pt; text-transform: uppercase; }
                    .kop-teks p { margin: 0; font-size: 9pt; line-height: 1.3; }
                    
                    .judul-surat { text-align: center; margin-bottom: 25px; }
                    .judul-surat h4 { margin: 0; font-weight: bold; text-decoration: underline; font-size: 14pt; text-transform: uppercase; }
                    .judul-surat p { margin: 5px 0 0 0; font-size: 11pt; }
                    
                    .isi-surat { font-size: 11pt; text-align: justify; }
                    .biodata-container { display: flex; align-items: flex-start; margin: 20px 0; }
                    .tabel-biodata { width: 100%; border-collapse: collapse; }
                    .tabel-biodata td { padding: 4px; vertical-align: top; font-size: 11pt; }
                    
                    .foto-skl { width: 3cm; height: 4cm; border: 1px solid #000; object-fit: cover; margin-right: 30px; display: block; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                    .status-box { width: 45%; margin: 20px auto; text-align: center; padding: 10px; font-weight: bold; font-size: 16pt; text-transform: uppercase; letter-spacing: 2px; ${statusBoxStyle} }
                    
                    .ttd-container { width: 100%; margin-top: 20px; display: flex; justify-content: flex-end; }
                    .ttd-area { width: 45%; text-align: center; font-size: 11pt; }
                    .ttd-area p { margin: 2px 0; }
                    .qr-barcode { margin: 8px auto; width: 85px; height: 85px; display: block; }
                    .qr-barcode img { width: 100%; height: 100%; object-fit: contain; }
                    
                    .btn-print { position: fixed; top: 20px; right: 20px; padding: 8px 16px; background: #1a237e; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif; }
                    @media print { .btn-print { display: none; } @page { size: A4; margin: 1cm; } }
                </style>
            </head>
            <body>
                <button class="btn-print" onclick="window.print()">🖨️ Cetak Dokumen</button>
                
                <div class="kop-surat">
                    <img src="https://i.ibb.co.com/zzfknCZ/kota-makassar.png" alt="Logo Kota Makassar"> 
                    <div class="kop-teks">
                        <h3>PEMERINTAH KOTA MAKASSAR</h3>
                        <h2>UPT SPF SMP NEGERI 13 MAKASSAR</h2>
                        <p>Alamat: Jl. Tamalate VI No. 2, Perumnas Tamalate Kec. Rappocini</p>
                        <p>Website: smpn13makassar.my.id | Email: smpn13makassar@yahoo.co.id | NPSN : 40307334</p>
                    </div>
                    <img src="https://i.ibb.co.com/SXV3cpZC/Logo-SMPN13.png" alt="Logo SMPN 13">
                </div>

                <div class="judul-surat">
                    <h4>SURAT KETERANGAN LULUS</h4>
                    <p>Nomor: 800/209/UPT SPF SMPN13/SKL/VI/2026</p>
                </div>

                <div class="isi-surat">
                    <p>Yang bertanda tangan di bawah ini, Kepala UPT SPF SMP Negeri 13 Makassar menerangkan bahwa:</p>
                    
                    <div class="biodata-container">
                        <img class="foto-skl" src="${fotoUrl || 'https://via.placeholder.com/120x160?text=Tanpa+Foto'}" alt="Foto Siswa">
                        <table class="tabel-biodata">
                            <tr><td style="width: 32%;">Nama Lengkap</td><td style="width: 3%;">:</td><td style="font-weight: bold;">${siswa.Nama_Siswa.toUpperCase()}</td></tr>
                            <tr><td>NISN</td><td>:</td><td>${siswa.Nisn}</td></tr>
                            <tr><td>Kelas</td><td>:</td><td>${siswa.Kelas || '-'}</td></tr>
                            <tr><td>Jenis Kelamin</td><td>:</td><td>${siswa.Kelamin || '-'}</td></tr>
                            <tr><td>Tempat & Tgl. Lahir</td><td>:</td><td>${(siswa.Tempat || '') + ', ' + (siswa.Tanggal || '')}</td></tr>
                            <tr><td>Predikat Akhir</td><td>:</td><td style="font-weight: bold;">${siswa.Nilai || '0'}</td></tr>
                            <tr><td>Predikat</td><td>:</td><td>${siswa.Predikat || '-'}</td></tr>
                        </table>
                    </div>

                    <p style="margin-top: 15px;">Berdasarkan Laporan Hasil Belajar Siswa dan rapat Dewan Guru tentang Kelulusan Siswa pada tanggal 25 Mei 2025 di UPT SPF SMP Negeri 13 Makassar Tahun Ajaran 2025/2026, yang bersangkutan dinyatakan:</p>
                    
                    <div class="status-box">${isLulus ? 'L U L U S' : 'TIDAK LULUS'}</div>

                    <p>Demikian Surat Keterangan Lulus ini diberikan kepada yang bersangkutan untuk dapat dipergunakan sebagaimana mestinya.</p>
                    
                    <div class="ttd-container">
                        <div class="ttd-area">
                            <p style="text-align: left; padding-left: 25px;">Ditetapkan di : Makassar</p>
                            <p style="text-align: left; padding-left: 25px;">Pada Tanggal : 02 Juni 2026</p>
                            <p style="text-align: left; padding-left: 25px; margin-bottom: 5px;">Kepala Sekolah,</p>
                            
                            <div class="qr-barcode">
                                <img src="${qrApiUrl}" alt="Validasi QR">
                            </div>
                            
                            <p style="font-weight: bold; text-decoration: underline; margin-top: 5px;">Drs. Ramli, M.Pd.</p>
                            <p>NIP. 196611091996021002</p>
                        </div>
                    </div>
                </div>
                <script>
                    window.onload = function() {
                        setTimeout(function() { window.print(); }, 800);
                    }
                <\/script>
            </body>
            </html>
            `;
            
            cetakWindow.document.write(htmlContent);
            cetakWindow.document.close();
        }

        function getDirectImg(url) {
            if(!url) return '';
            let match = url.match(/[-\w]{25,}/);
            return match ? 'https://drive.google.com/thumbnail?id=' + match[0] + '&sz=w200' : url;
        }
    </script>
</body>
</html>
