<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - MiniWeb Ujian</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f1f5f9;
      margin: 0;
      padding: 0;
      color: #1e293b;
    }
    .admin-header {
      background-color: #4338ca;
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .admin-header h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    .admin-header p {
      margin: 5px 0 0 0;
      font-size: 0.9rem;
      opacity: 0.9;
    }
    .admin-container {
      max-width: 700px;
      margin: 30px auto;
      padding: 0 15px;
      box-sizing: border-box;
    }
    .admin-card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      margin-bottom: 25px;
    }
    .admin-card h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #334155;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .form-control {
      width: 100%;
      padding: 10px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      box-sizing: border-box;
      outline: none;
      transition: border 0.2s;
    }
    .form-control:focus {
      border-color: #4338ca;
    }
    .btn-submit {
      background-color: #10b981;
      color: white;
      border: none;
      padding: 12px 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2);
      transition: background 0.2s;
    }
    .btn-submit:hover {
      background-color: #059669;
    }
    
    /* Tabel List Soal */
    .table-responsive {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      text-align: left;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background-color: #f8fafc;
      color: #64748b;
      font-weight: 600;
    }
    .badge {
      padding: 3px 6px;
      border-radius: 4px;
      color: white;
      font-weight: 600;
      font-size: 0.75rem;
    }
    .btn-delete {
      background-color: #dc2626;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .btn-delete:hover {
      background-color: #b91c1c;
    }
    #statusMessage {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
      font-weight: 500;
    }
    .status-success { background-color: #d1fae5; color: #065f46; }
    .status-loading { background-color: #e0f2fe; color: #0369a1; }
    .status-error { background-color: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>

<div class="admin-header">
  <h1>Panel Kendali Admin MiniWeb</h1>
  <p>Kelola Link Ujian SMPN 13 Makassar tanpa Edit Script GitHub</p>
</div>

<div class="admin-container">
  
  <div id="statusMessage"></div>

  <!-- KARTU FORM INPUT -->
  <div class="admin-card">
    <h2><i class="fa-solid fa-plus-circle"></i> Tambah / Perbarui Link Ujian</h2>
    <form id="ujianForm" onsubmit="simpanData(event)">
      <div class="form-group">
        <label>Pilih Tingkat Kelas</label>
        <select id="inputKelas" class="form-control" required>
          <option value="" disabled selected>-- Pilih Kelas --</option>
          <option value="kelas7">Kelas 7</option>
          <option value="kelas8">Kelas 8</option>
          <option value="kelas9">Kelas 9</option>
        </select>
      </div>

      <div class="form-group">
        <label>Mata Pelajaran (Mapel)</label>
        <select id="inputMapel" class="form-control" required>
          <option value="" disabled selected>-- Pilih Mata Pelajaran --</option>
          <option value="Pendidikan Agama">Pendidikan Agama</option>
          <option value="Pendidikan Pancasila">Pendidikan Pancasila</option>
          <option value="Bahasa Indonesia">Bahasa Indonesia</option>
          <option value="Bahasa Inggris">Bahasa Inggris</option>
          <option value="Matematika">Matematika</option>
          <option value="IPA">IPA</option>
          <option value="IPS">IPS</option>
          <option value="PJOK">PJOK</option>
          <option value="Seni Budaya">Seni Budaya</option>
          <option value="Prakarya">Prakarya</option>
          <option value="Informatika">Informatika</option>
          <option value="Muatan Lokal">Muatan Lokal</option>
        </select>
      </div>

      <div class="form-group">
        <label>URL / Link Ujian (Dari Google Apps Script / Google Form)</label>
        <input type="url" id="inputLink" class="form-control" placeholder="https://script.google.com/... atau https://forms.gle/..." required>
      </div>

      <div class="form-group">
        <label>Token Ujian</label>
        <input type="text" id="inputToken" class="form-control" placeholder="Contoh: PKNKU13" required>
      </div>

      <div class="form-group">
        <label>Desain Warna Tombol Siswa</label>
        <select id="inputWarna" class="form-control" required>
          <option value="bg-teal">Teal (Hijau Toska)</option>
          <option value="bg-purple" selected>Purple (Ungu Premium)</option>
          <option value="bg-blue">Blue (Biru Profesional)</option>
          <option value="bg-red">Red (Merah Tegas)</option>
          <option value="bg-emerald">Emerald (Hijau Sukses)</option>
        </select>
      </div>

      <button type="submit" class="btn-submit"><i class="fa-solid fa-cloud-arrow-up"></i> Publikasikan ke Aplikasi Siswa</button>
    </form>
  </div>

  <!-- KARTU DAFTAR LINK YANG AKTIF -->
  <div class="admin-card">
    <h2><i class="fa-solid fa-list-check"></i> Daftar Link Ujian Aktif Saat Ini</h2>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Kelas</th>
            <th>Mata Pelajaran</th>
            <th>Token</th>
            <th>Warna</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelDataUjian">
          <tr>
            <td colspan="5" style="text-align:center; color:#64748b;">Sedang mengambil data dari server...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
  // PENTING: Ganti URL di bawah ini dengan URL Web App Google Apps Script Anda!
  var urlAPI = "GANTI_DENGAN_URL_WEB_APP_ANDA";

  function tampilkanNotifikasi(pesan, tipe) {
    var box = document.getElementById("statusMessage");
    box.className = "status-" + tipe;
    box.innerHTML = pesan;
    box.style.display = "block";
    if(tipe === "success") {
      setTimeout(() => { box.style.display = "none"; }, 4000);
    }
  }

  function muatDaftarUjian() {
    fetch(urlAPI)
      .then(res => res.json())
      .then(data => {
        var tbody = document.getElementById("tabelDataUjian");
        tbody.innerHTML = "";
        
        if(data.length === 0) {
          tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:#64748b;'>Belum ada link ujian aktif yang dibuat.</td></tr>";
          return;
        }

        data.forEach(item => {
          var klsDisplay = item.kelas === "kelas7" ? "Kelas 7" : item.kelas === "kelas8" ? "Kelas 8" : "Kelas 9";
          var tr = document.createElement("tr");
          tr.innerHTML = `
            <td><strong>${klsDisplay}</strong></td>
            <td>${item.mapel}</td>
            <td><code>${item.token}</code></td>
            <td><span class="badge ${item.warna}">${item.warna.replace("bg-", "")}</span></td>
            <td>
              <button class="btn-delete" onclick="hapusUjian('${item.kelas}', '${item.mapel}', '${item.token}')">
                <i class="fa-solid fa-trash-can"></i>
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        console.error(err);
        document.getElementById("tabelDataUjian").innerHTML = "<tr><td colspan='5' style='text-align:center; color:#dc2626;'>Gagal mengambil data dari server.</td></tr>";
      });
  }

  function simpanData(e) {
    e.preventDefault();
    tampilkanNotifikasi("<i class='fa-solid fa-spinner fa-spin'></i> Memproses pengiriman data ke server...", "loading");

    var kelas = document.getElementById("inputKelas").value;
    var mapel = document.getElementById("inputMapel").value;
    var link = document.getElementById("inputLink").value;
    var token = document.getElementById("inputToken").value;
    var warna = document.getElementById("inputWarna").value;

    // Menggunakan Metode GET Query Parameter untuk stabilitas CORS yang tinggi pada server statis
    var urlKirim = `${urlAPI}?action=add&kelas=${encodeURIComponent(kelas)}&mapel=${encodeURIComponent(mapel)}&link=${encodeURIComponent(link)}&token=${encodeURIComponent(token)}&warna=${encodeURIComponent(warna)}`;

    fetch(urlKirim)
      .then(res => res.json())
      .then(res => {
        if(res.status === "success") {
          tampilkanNotifikasi("<i class='fa-solid fa-circle-check'></i> Berhasil! Link ujian telah aktif di halaman siswa.", "success");
          document.getElementById("ujianForm").reset();
          muatDaftarUjian();
        } else {
          tampilkanNotifikasi("<i class='fa-solid fa-circle-xmark'></i> Gagal menyimpan data.", "error");
        }
      })
      .catch(err => {
        tampilkanNotifikasi("<i class='fa-solid fa-circle-xmark'></i> Terjadi kesalahan jaringan.", "error");
        console.error(err);
      });
  }

  function hapusUjian(kelas, mapel, token) {
    if(confirm(`Apakah Anda yakin ingin menghapus link ujian ${mapel} untuk ${kelas}?`)) {
      tampilkanNotifikasi("<i class='fa-solid fa-spinner fa-spin'></i> Menghapus data dari server...", "loading");
      
      var urlHapus = `${urlAPI}?action=delete&kelas=${encodeURIComponent(kelas)}&mapel=${encodeURIComponent(mapel)}&token=${encodeURIComponent(token)}`;
      
      fetch(urlHapus)
        .then(res => res.json())
        .then(res => {
          if(res.status === "success") {
            tampilkanNotifikasi("<i class='fa-solid fa-circle-check'></i> Sukses! Link ujian berhasil dihapus.", "success");
            muatDaftarUjian();
          } else {
            tampilkanNotifikasi("<i class='fa-solid fa-circle-xmark'></i> Gagal menghapus data.", "error");
          }
        })
        .catch(err => {
          tampilkanNotifikasi("<i class='fa-solid fa-circle-xmark'></i> Kesalahan jaringan saat menghapus.", "error");
          console.error(err);
        });
    }
  }

  // Panggil saat halaman dimuat pertama kali
  window.onload = muatDaftarUjian;
</script>
</body>
</html>
